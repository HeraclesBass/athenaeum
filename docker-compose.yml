services:
  db:
    image: pgvector/pgvector:pg16
    container_name: athenaeum_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5442:5432"
    environment:
      POSTGRES_DB: athenaeum
      POSTGRES_USER: athenaeum
      POSTGRES_PASSWORD: ${ATHENAEUM_DB_PASSWORD:?Set ATHENAEUM_DB_PASSWORD in .env}
    volumes:
      - athenaeum_pgdata:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athenaeum"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: athenaeum_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8140:8000"
    environment:
      DATABASE_URL: postgresql://athenaeum:${ATHENAEUM_DB_PASSWORD}@db:5432/athenaeum
      PYTHONPATH: /app
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      APP_URL: ${APP_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data

  frontend:
    build: ./frontend
    container_name: athenaeum_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3140:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8140}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3140}
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-}
    depends_on:
      - api

volumes:
  athenaeum_pgdata:
